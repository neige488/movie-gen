      @video에서 이어진 컷. 미디엄 투샷 · handheld follow, then hold · soft window daylight from camera-left · @p1_c_jihoon_uniform_full 이 화면 왼쪽에서 오른쪽으로 성큼성큼 걸어가 교실 뒤편에 서 있던 @p1_c_sua_uniform_full 앞에 멈춰 선다 — 지훈이 화면 왼쪽에서 오른쪽을 향하고, 여학생이 화면 오른쪽에서 그를 마주 본다 · 지훈이 노려보며 말한다: “너지. 어디 숨겼어.” 여학생이 눈을 크게 뜨며 말한다: “…뭐?” 지훈이 말한다: “말을 해.” 여학생이 화면 오른쪽 뒷벽 쪽으로 반걸음 뒷걸음질 치며 말한다: “무슨 말인지 모르겠는데…” 지훈이 말한다: “꺼져. 다시는 내 앞에 나타나지 마.” · 연기: 지훈 턱에 힘이 들어가고 목소리가 커진다, 여학생 손끝이 옆 책상 모서리를 더듬는다 · voice: @p1_c_jihoon_voice
