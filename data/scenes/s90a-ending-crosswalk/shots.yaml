    prompt: 'The crosswalk, red light. JIHOON (18, Korean high school boy, grey hoodie over uniform shirt, half-zipped backpack) stands at the curb; beside him SUA (18, Korean girl, chin-length black bob with straight bangs, oversized oatmeal-beige knit cardigan over white pointed-collar shirt, navy ankle pants, white ankle socks, red canvas sneakers) reads, in profile. This time he does not cross. He stops, turns his head toward her, and says: "안녕. 갑자기 말 걸어서 미안한데 난 지훈이라고 해." She does not look up from the book. One full beat of silence. HARD CUT TO BLACK — no reaction, the greeting left hanging in the air forever. Cold, precise, no warmth in the grade. Muted desaturated realistic tone, cold available light, restrained handheld, 35mm cinematic.'
