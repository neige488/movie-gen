    prompt: |-
      Cut #1 — 슬로우모션, 미디엄 · 핸드헬드 · 시작 프레임(횡단보도 앞에 신호등 쪽을 보고 건널 준비를 하며 카메라를 등진 채 @p1_p_poetrybook_cover 를 펼쳐 들고 읽는 @p1_c_sua_accidentday_full)에서 이어져, @p1_c_jihoon_hoodiewithbag_full 이 그녀 뒤에서 옆을 빠르게 추월해 프레임을 가로질러 차도로 나아간다, 추월하는 순간 카메라가 수아를 지나치며 @p1_c_sua_accidentday_face 의 3/4 옆얼굴이 스치듯 보인다 · 책은 펼쳐 들어 표지가 카메라에 보이지 않는다 · 신호등 빨간불이 프레임 가장자리에서 붉게 번진다 · 연기: 수아는 책에서 눈을 떼지 않고 평온·무심, 지훈은 멈추지 않고 빈 차도로
