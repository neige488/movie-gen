  - id: "03"
    prompt: |-
      @video에서 이어진 컷(직전 샷 영상에서 연속).
      Cut #1 — 인서트 클로즈업 · fixed camera · @p1_l_crosswalk_signalred 보행 신호등의 빨간불이 꺼지고 초록불이 켜진다 · 조명: soft midday sunlight from camera-left
      Cut #2 — 와이드 풀샷(이쪽 보도에서 길 건너편을 정면으로) · fixed camera · @p1_l_crosswalk_daywide 횡단보도, @p1_c_jihoon_hoodiewithbag_full(화면 왼쪽)이 가방끈을 추켜올리며 말한다: "나 먼저 간다. 나중에 보자." 그러곤 카메라에서 멀어지는 방향으로 횡단보도를 뛰어 건너 길 건너편으로 작아진다. @p1_c_sua_accidentday_full(화면 오른쪽)는 이쪽 보도에 그대로 남아 멀어지는 지훈의 등을 바라본다 · 연기: 수아 — 잔잔한 응시, 따뜻한 오후의 느긋함 · voice: @p1_c_jihoon_voice
