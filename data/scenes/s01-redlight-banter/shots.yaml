  - id: "01"
    prompt: |-
      @video에서 이어진 컷(직전 s00a, 차도로 발 내딛던 순간에서 분기). 미디엄(등 뒤 3/4 측면, 길 건너편이 화면 안쪽) · handheld(인물을 프레임에 유지) · @p1_l_crosswalk_daywide 횡단보도 앞 — @p1_c_sua_accidentday_full 는 보도 끝 화면 오른쪽에서 길 건너편(화면 안쪽)을 향해 선 채 책에 시선을 두고 있다. 차도로 막 발을 내딛던 @p1_c_jihoon_hoodiewithbag_full 이 화면 오른쪽 수아의 옆얼굴(@p1_c_sua_accidentday_face)을 알아보고, 내딛던 발을 도로 거둬 몸을 화면 오른쪽으로 틀어 수아의 왼쪽 옆(화면 왼쪽)에 다가선다(얼굴 일관성 위해 @p1_c_jihoon_hoodiewithbag_face 동반) · 조명: soft midday sunlight from camera-left · 연기: 지훈 — 아는 얼굴을 알아본 순간의 충동적인 방향 전환, 수아 — 평온한 무심
