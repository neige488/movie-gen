  - id: "02"
    prompt: |-
      @video에서 이어진 컷(직전 샷 영상에서 연속).
      Cut #1 — 미디엄 투샷(등 뒤 3/4 측면, 길 건너편이 화면 안쪽) · fixed camera, 미세 드리프트 · @p1_l_crosswalk_daywide 를 배경으로 @p1_c_jihoon_hoodiewithbag_full 이 화면 왼쪽, @p1_c_sua_accidentday_full 가 화면 오른쪽에 나란히 서서 길 건너편을 향한다. 수아가 책에서 눈을 들어 고개를 화면 왼쪽 지훈 쪽으로 돌리며 말한다: "너 또 빨간불에 건너려 했지?" 지훈이 정면(길 건너편)을 본 채 답한다: "아니거든." · 조명: soft midday sunlight from camera-left
      Cut #2 — 클로즈업 · fixed camera · @p1_c_sua_accidentday_face 가 화면 왼쪽(지훈 쪽)을 보며 말한다: "거짓말." · 연기: 확신에 찬 장난기, 입꼬리만 살짝 올라간다
      Cut #3 — 리버스 클로즈업 · fixed camera · @p1_c_jihoon_hoodiewithbag_face 가 화면 오른쪽(수아 쪽)을 보며 말한다: "넌 어떻게 맨날 알아?" · 연기: 억울해서 살짝 벌어지는 입
      Cut #4 — 미디엄 투샷(등 뒤 3/4 측면) · fixed camera · @p1_c_sua_accidentday_full(화면 오른쪽)가 화면 왼쪽의 @p1_c_jihoon_hoodiewithbag_full 을 향해 말한다: "네가 맨날 그러니까." 지훈이 억울한 듯 웃고, 그 사이 차 한 대가 둘 앞 차도를 화면 왼쪽에서 오른쪽으로 스쳐 지나간다 (나중에 수아를 칠 차, 첫 관람엔 평범한 차)
      Cut #5 — 인서트(low angle 클로즈업) · fixed camera · 방금 지나간 자동차의 바퀴가 아스팔트 위를 화면 왼쪽에서 오른쪽으로 굴러간다 · voice: @p1_c_jihoon_voice, @p1_c_sua_voice
