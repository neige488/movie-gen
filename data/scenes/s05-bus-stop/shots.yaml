  - id: '01'
    prompt: 'Small Korean neighborhood bus stop at dusk. SUA (18, Korean girl, chin-length black bob with straight bangs, oversized oatmeal-beige knit cardigan over white pointed-collar shirt, navy ankle pants, white ankle socks, red canvas sneakers) reads on the bench; JIHOON (18, Korean high school boy, grey hoodie over uniform shirt, half-zipped backpack) beside her keeps stealing glances. Korean dialogue: JIHOON: "맨날 뭘 그렇게 읽냐?" SUA: "집에 가는 이야기." JIHOON: "그게 재밌어?" SUA: "집에 가는 게 제일 어려운 사람도 있잖아." Low golden light. Warm nostalgic Korean coming-of-age film look, soft golden light, gentle slightly too-perfect dreaminess, 35mm cinematic.'
