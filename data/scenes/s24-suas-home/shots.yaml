  - id: '02'
    prompt: 'The mother takes the book, turns to the inside cover — a handwritten name. Her hands begin to shake. MOTHER: "…이걸 어디서." JIHOON: "길에서… 주웠어요." She clutches the book to her chest and says, half to herself: "장례 때도… 이 책만 못 찾았어." The line falls like a blade in slow silence. Muted desaturated realistic tone, cold available light, restrained handheld, 35mm cinematic.'
