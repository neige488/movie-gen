  - id: "04"
    prompt: |-
      @video에서 이어진 컷. 환상의 마지막 명멸 — 파편 몽타주, 컷마다 동작 하나만. Cut #1 — 미디엄 투샷 · fixed camera · warm afternoon sunlight from camera-left · 횡단보도 신호등 앞, @p1_c_jihoon_dateoutfit_full 이 화면 왼쪽, @p1_c_sua_accidentday_full 가 화면 오른쪽에 서로 마주 보고 서서 입을 움직이며 묻고 답한다
      Cut #2 — 미디엄 · fixed camera · 비 오는 골목, 우산 하나 아래 @p1_c_jihoon_dateoutfit_full 과 @p1_c_sua_accidentday_full 이 어깨를 붙이고 화면 왼쪽에서 오른쪽으로 나란히 걷는다
      Cut #3 — 미디엄 · fixed camera · 회전목마가 천천히 돌고, 나란한 목마 위의 @p1_c_jihoon_dateoutfit_full 과 @p1_c_sua_accidentday_full 이 서로를 보며 웃는다
      Cut #4 — 클로즈업 인서트 · fixed camera · 빙판 위, 스케이트를 신은 두 사람의 맞잡은 손
      Cut #5 — 미디엄 · fixed camera · 언덕 벤치 옆 빨간 우체통에 @p1_c_sua_accidentday_full 가 편지를 넣는다
