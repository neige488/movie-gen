  - id: '01'
    prompt: 'Third-floor open corridor of an old Korean apartment. JIHOON (18, Korean high school boy, soft features, black hair, school uniform) rings the doorbell, the poetry book in both hands; SUA (18, Korean girl, chin-length black bob with straight bangs, oversized oatmeal-beige knit cardigan over white pointed-collar shirt, navy ankle pants, white ankle socks, red canvas sneakers) waits at the corridor''s far end. The door opens — SUA-MOTHER (late 40s, deep fatigue). JIHOON: "저… 이거. 따님 책인 것 같아서요." He holds out the book. Muted desaturated realistic tone, cold available light, restrained handheld, 35mm cinematic.'
