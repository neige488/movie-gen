    prompt: |-
      @video에서 이어진 컷. 사고의 진실 — 파편 컷, 컷마다 동작 하나만, 충돌 자체는 프레임 밖(완결해 보여주지 말 것). Cut #1 — 와이드 · fixed camera · clear midday sunlight from high overhead · @p1_l_crosswalk_daywide 이쪽 보도 끝, 카메라 가까이 화면 왼쪽에 @p1_c_sua_accidentday_full 가 길 건너편을 향해 서서 @p1_p_poetrybook_cover 를 읽고 있다, @p1_c_jihoon_onlyhoodie_full 이 화면 오른쪽 뒤에서 달려 들어와 수아를 비켜 지나 횡단보도 위로, 카메라에서 멀어지며 건너간다
      Cut #2 — 미디엄 · handheld · 다 건넌 @p1_c_jihoon_onlyhoodie_full 이 건너편 보도에서 멈춰 돌아서서 카메라 쪽(수아 쪽)을 본다 — 아는 얼굴인 듯
      Cut #3 — 옆얼굴 클로즈업 · handheld · @p1_c_sua_accidentday_face 가 인기척에 책에서 고개를 든다, 시선은 길 건너 지훈 쪽
      Cut #4 — 미디엄, 수아의 등 뒤 · fixed camera · @p1_c_sua_accidentday_full 가 보도에서 내려서 카메라에서 멀어지며 횡단보도 위로 걸어 들어간다, slow motion
      Cut #5 — 로우앵글 인서트 · fixed camera · 화면 밖 브레이크 소리, 하늘을 배경으로 허공에 뜬 @p1_p_poetrybook_cover 가 slow motion 으로 회전한다
      Cut #6 — 인서트 · fixed camera · 흰 줄무늬 위를 구르다 멈추는 빨간 운동화 한 짝 · 연기: 수아는 초록불로 착각한 듯 망설임 없는 걸음 — 충돌은 끝까지 보여주지 않는다
