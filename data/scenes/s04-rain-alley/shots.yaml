    prompt: 'Evening rain in a narrow Korean alley, one umbrella shared. SUA (18, Korean girl, chin-length black bob with straight bangs, oversized oatmeal-beige knit cardigan over white pointed-collar shirt, navy ankle pants, white ankle socks, red canvas sneakers) hugs her poetry book to her chest; the umbrella keeps tilting toward the book. Korean dialogue: JIHOON: "너보다 책이 더 중요하냐?" SUA: "책은 젖으면 티 나잖아." JIHOON: "사람은?" SUA: "사람은 말리면 돼." Wet asphalt reflections, intimate side tracking shot. Warm nostalgic Korean coming-of-age film look, soft golden light, gentle slightly too-perfect dreaminess, 35mm cinematic.'
