    prompt: |-
      파편 몽타주 — 서로 다른 날의 짧은 컷들이 연달아 이어진다, 어느 게 어느 날인지 분간되지 않게, 컷마다 동작은 하나씩만
      Cut #1 (가짜) — 와이드 · handheld · harsh midday daylight from above · @p1_l_sidestreet_schoolroute 이면도로 한복판, 넘어져 있던 익명의 교복 여자아이(레퍼런스와 다른 얼굴, 수아 아님)가 벌떡 일어나 치마를 털고, 카메라를 등진 채 길 안쪽으로 뒤도 안 보고 멀어진다, 끼익 하는 타이어 마찰음
      Cut #2 (진짜) — 인서트 · fixed camera · @p1_l_crosswalk_daywide 흰 줄무늬 횡단보도 위 허공에 책 한 권이 slow motion 으로 떠 있다, 화면 밖에서 브레이크 소리
      Cut #3 (가짜) — 클로즈업 인서트 · fixed camera · 아스팔트 위에 떨어진 @p1_p_poetrybook_cover 를 향해 손 하나가 화면 오른쪽에서 들어와 집어 든다
      Cut #4 (진짜) — 로우앵글 인서트 · fixed camera · 도로 바닥, 빨간 운동화 한 짝이 화면 왼쪽에서 오른쪽으로 굴러가다 멈춘다 · 연기: 어떤 컷도 사건의 전후를 보여주지 않고 중간에서 끊긴다(완결 금지)
