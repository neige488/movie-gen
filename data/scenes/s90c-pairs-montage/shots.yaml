  - id: "02"
    prompt: |-
      @video에서 이어진 컷. 대사 없음 — 투샷이 같은 구도의 혼자 샷으로 디졸브되는 몽타주.
      Cut #1 — 와이드 · fixed camera · @p1_l_hillbench_daycityview 벤치에 나란히 앉아 책을 읽던 두 사람에서 왼쪽 옆자리의 소녀가 디졸브로 사라진다 — 같은 구도, @p1_c_jihoon_onlyhoodie_full 이 벤치 오른쪽 끝에 혼자 앉아 있고 벤치 왼쪽은 비어 있다 · 조명: flat overcast daylight
      Cut #2 — 인서트, 미디엄 클로즈업 · fixed camera · 편의점 창가 테이블 — 마주 놓인 김이 오르는 컵라면 두 개에서 맞은편 자리의 사람과 컵라면이 디졸브로 사라지고 컵라면 하나만 남는다, 맞은편 의자는 비어 있다 · 조명: cold fluorescent from above
      Cut #3 — 와이드 · fixed camera · 놀이공원 회전목마가 천천히 돈다 — 목마에 앉은 @p1_c_jihoon_onlyhoodie_full 의 옆 목마에 탔던 동승자가 디졸브로 사라진다, 아이들 사이에 혼자, 옆 목마는 빈 채로 돈다 · 조명: flat overcast daylight
      Cut #4 — 와이드 · fixed camera · 실내 아이스링크 — 나란히 손잡고 지치던 둘에서 옆사람이 디졸브로 사라지고, @p1_c_jihoon_onlyhoodie_full 이 혼자 화면 왼쪽에서 오른쪽으로 흔들림 없이 미끄러져 간다 · 조명: cold white rink light from above
