    prompt: |-
      Cut #1 — 미디엄 투샷 · fixed camera, 미세 드리프트 · @p1_l_hillbench_sunset 벤치 정면 — @p1_c_jihoon_onlyhoodie_full(얼굴 일관성 위해 @p1_c_jihoon_onlyhoodie_face 동반) 이 벤치 화면 오른쪽에 카메라를 향해 앉고, @p1_c_sua_accidentday_full(얼굴 일관성 위해 @p1_c_sua_accidentday_face 동반) 는 지훈의 무릎을 베고 머리를 화면 오른쪽에 둔 채 다리를 화면 왼쪽으로 뻗어 하늘을 보고 누워, 읽던 @p1_p_poetrybook_cover 를 가슴에 덮는다, 두 사람 등 뒤로 노을 하늘과 불 켜지는 도시 · warm sunset backlight from behind the bench · 수아가 (책을 가슴에 덮으며) 말한다: "있잖아. 나 가고 싶은 데 생겼다?" 지훈이 말한다: "어딘데." 수아가 말한다: "호수가 있고, 뒤에 눈 쌓인 산이 있어. 물이 무슨… 물감 풀어놓은 것 같애." 지훈이 말한다: "그런 데가 어딨어." 수아가 (웃으며) 말한다: "있대, 진짜. 책에서 봤어." · 연기: 수아 들뜬 말투로 허공에 손가락을 그리고, 지훈은 수아 얼굴을 내려다보며 옅은 미소
      Cut #2 — 인서트 클로즈업 · fixed camera · @p1_c_sua_accidentday_full 가 누운 채 @p1_p_poetrybook_cover 를 두 손으로 들어 카메라 쪽으로 펼쳐 보인다 — 펼친 페이지에 눈 쌓인 산 아래 물감을 풀어놓은 듯한 푸른 호수 사진 · 연기: 수아의 손끝이 호수 사진을 짚는다 · voice: @p1_c_sua_voice, @p1_c_jihoon_voice
