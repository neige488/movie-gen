  - id: '01'
    prompt: 'An old apartment playground at dusk, a swing creaking. SUA (18, Korean girl, chin-length black bob with straight bangs, oversized oatmeal-beige knit cardigan over white pointed-collar shirt, navy ankle pants, white ankle socks, red canvas sneakers) sits on a swing, pushing the sand with her toes. JIHOON (18, Korean high school boy, grey hoodie over uniform shirt, half-zipped backpack) stands at the entrance, face crumpling at the sight of her. Korean dialogue: SUA, as if nothing happened: "늦었네." JIHOON, throat tight: "…어." SUA nods at the next swing: "앉아." She offers no comfort — she is simply there, unchanged. Warm nostalgic Korean coming-of-age film look, soft golden light, gentle slightly too-perfect dreaminess, 35mm cinematic.'
