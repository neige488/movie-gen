    prompt: 'A small old Korean bunsik snack bar. JIHOON (18, Korean high school boy, grey hoodie over uniform shirt, half-zipped backpack) and SUA (18, Korean girl, chin-length black bob with straight bangs, oversized oatmeal-beige knit cardigan over white pointed-collar shirt, navy ankle pants, white ankle socks, red canvas sneakers) sit across from each other. The owner sets down ONE water cup, looks only at the boy. Korean dialogue: OWNER: "뭐 줄까?" JIHOON: "떡볶이 이인분이요." OWNER, an odd beat: "…그래, 많이 먹어." First read: a busy ajumma. Muted desaturated realistic tone, cold available light, restrained handheld, 35mm cinematic.'
