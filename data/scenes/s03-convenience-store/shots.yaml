    prompt: 'Korean convenience store window seats at night, warm fluorescent glow. JIHOON (18, Korean high school boy, grey hoodie over uniform shirt, half-zipped backpack) with cup ramyeon; SUA (18, Korean girl, chin-length black bob with straight bangs, oversized oatmeal-beige knit cardigan over white pointed-collar shirt, navy ankle pants, white ankle socks, red canvas sneakers) nibbles a samgak-gimbap in tiny bites, one milk carton beside it. Korean dialogue: JIHOON: "그거 하나로 저녁이 돼?" SUA: "천천히 먹으면 오래가." JIHOON: "그게 무슨 말이야." SUA: "빨리 먹으면 없어지잖아." Matter-of-fact sweetness, natural lip sync. Warm nostalgic Korean coming-of-age film look, soft golden light, gentle slightly too-perfect dreaminess, 35mm cinematic.'
