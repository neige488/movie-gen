name: school-ground
references:
  - name: field
    refName: p1_l_schoolground_field
    prompt: 방과 후 한국 고등학교 운동장 — 넓은 흙·트랙 바닥, 한쪽에 축구 골대, 가장자리를 따라 낮은 스탠드와 나무 몇 그루, 뒤로 학교 건물. 한낮의 부드러운 빛. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 따뜻한 골든 색감과 파스텔 톤, 부드러운 노스탤지어 무드, 공간 디테일이 또렷한 정상 노출(과노출 금지), 35mm 필름.
    image: school-ground/field.png
  - name: stand-bench
    refName: p1_l_schoolground_standbench
    prompt: 방과 후 한국 고등학교 운동장 가장자리의 낮은 스탠드(관중석) 벤치 — 나무·콘크리트 벤치, 뒤로 나무와 담장, 앞으로 운동장이 펼쳐진다, 한낮의 부드러운 빛. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 따뜻한 골든 색감과 파스텔 톤, 부드러운 노스탤지어 무드, 공간 디테일이 또렷한 정상 노출(과노출 금지), 35mm 필름.
    image: school-ground/stand-bench.png
