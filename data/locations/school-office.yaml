    prompt: 현대적 한국 고등학교 교무실 — 한쪽 벽을 따라 학생 생활기록부 바인더가 라벨과 함께 줄지어 꽂힌 키 큰 문서 캐비닛(책장), 그 앞으로 교사 책상들이 늘어서고 쌓인 서류. 공간이 안쪽으로 깊게 이어져 멀리 출입문과 그 너머 복도가 원경으로 작게 보이는 깊은 레이아웃(한 인물이 책장 앞에 서고 다른 인물이 출입구 원경에서 지켜볼 수 있는 깊이감). 늦은 오후 빛. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 따뜻한 골든 색감과 파스텔 톤, 부드러운 노스탤지어 무드, 공간 디테일이 또렷한 정상 노출, 35mm 필름.
