name: crosswalk
references:
  - name: day-wide
    refName: p1_l_crosswalk_daywide
    prompt: 대낮의 넓은 4차선 횡단보도 — 중층 상가 건물들(성북구 거리다운 학원·약국·식당·은행 한글 간판이 또렷하고 자연스럽게), 깔끔한 보도, 뒤로 대단지 아파트, 건너편에 빨간불이 켜진 현대식 보행 신호등. 맑은 한낮. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 고르고 부드러운 자연광과 은은한 중립 톤, 공간 구조·재질이 또렷한 정상 노출(그레이드는 후처리 looks가 입힘).
    image: crosswalk/day-wide.png
  - name: signal-red
    refName: p1_l_crosswalk_signalred
    prompt: 빨간불이 켜진 현대식 한국 보행 신호등의 클로즈, 부드러운 오후 역광, 얕은 심도, 뒤로 흐려진 거리. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 고르고 부드러운 자연광과 은은한 중립 톤, 공간 구조·재질이 또렷한 정상 노출(그레이드는 후처리 looks가 입힘).
    image: crosswalk/signal-red.png
  - name: dusk
    refName: p1_l_crosswalk_dusk
    prompt: 같은 넓은 4차선 횡단보도의 해질녘 — 건너편 빨간불, 켜지기 시작하는 따뜻한 가로등, 정돈된 빈 도로. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 따뜻한 노스탤지어 색감의 부드러운 자연광, 공간이 또렷한 정상 노출, 35mm 필름.
    image: crosswalk/dusk.png
