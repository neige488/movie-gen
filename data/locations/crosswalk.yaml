    prompt: 대낮의 넓은 4차선 횡단보도 — 중층 건물들, 깔끔한 보도, 뒤로 대단지 아파트, 건너편에 빨간불이 켜진 현대식 보행 신호등. 맑은 한낮. 배경 2026년 서울. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 읽을 수 있는 간판·글자 없음, 시네마틱 35mm 필름.
