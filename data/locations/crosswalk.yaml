name: crosswalk
references:
  - name: day-wide
    refName: p1_l_crosswalk_daywide
    prompt: >-
      대낮의 넓은 4차선 횡단보도 — 카메라는 횡단보도 이쪽 보도 끝에 서서 길 건너편을 정면으로 바라본다. 흰 횡단보도 줄무늬가 화면 아래에서 시작해 도로를 가로질러 건너편으로 뻗어 나가며 원근으로 멀어진다.
      보행 신호등은 길 건너편 끝 보도에 멀리(작게) 서서 빨간불이 켜져 있다 — 신호등이 카메라 가까이 앞쪽에 오지 않게, 어디까지나 건너편 저편에. 양옆으로 중층 상가 건물들(성북구 거리다운
      학원·약국·식당·은행 한글 간판이 또렷하고 자연스럽게), 깔끔한 보도, 뒤로 대단지 아파트. 맑은 한낮. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 따뜻한 골든
      색감과 파스텔 톤, 부드러운 노스탤지어 무드, 공간 디테일이 또렷한 정상 노출(과노출 금지), 35mm 필름.
    image: locations/crosswalk/day-wide.png
  - name: signal-red
    refName: p1_l_crosswalk_signalred
    prompt: >-
      빨간불이 켜진 현대식 한국 보행 신호등의 클로즈, 부드러운 오후 역광, 얕은 심도, 뒤로 흐려진 거리. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 따뜻한 골든
      색감과 파스텔 톤, 부드러운 노스탤지어 무드, 공간 디테일이 또렷한 정상 노출(과노출 금지), 35mm 필름.
    image: locations/crosswalk/signal-red.png
