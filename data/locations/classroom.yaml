name: classroom
references:
  - name: midday
    refName: p1_l_classroom_midday
    prompt: >-
      점심시간의 현대적 한국 고등학교 교실 — 정돈된 책상, 창가로 비스듬히 드는 빛, 앞쪽 벽엔 녹색 칠판(물백묵용). 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지,
      따뜻한 노스탤지어 색감과 파스텔 톤, 부드러운 창가 자연광, 공간 구조·재질이 또렷한 정상 노출(과노출 금지), 35mm 필름.
    image: locations/classroom/midday.png
  - name: empty-desk
    refName: p1_l_classroom_emptydesk
    prompt: >-
      현대적 한국 고등학교 교실, 창가 줄의 한 책상만 휑하게 비어 — 의자는 제자리에 가지런히 놓여 있지만 책상 위엔 아무것도 없고 얇은 먼지만 앉았다, 다른 모든 책상엔 학생들의 물건. 조용하고 약간 채도 낮은 톤. 배경 2026년 서울
      성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 차갑고 탈색된 색감과 형광의 서늘한 중립 톤, 공간 디테일이 또렷한 정상 노출, 16mm 필름 그레인.
    image: classroom/empty-desk.png
