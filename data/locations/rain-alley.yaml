    refName: p1_l_rainalley_rain
    prompt: >-
      고등학교에서 동네 버스정류장으로 가는 조용한 가로수 하굣길, 늦은 오후의 잔잔한 비 — 한적한 2차선 주택가 도로변 보도, 낮은 벽돌담, 젖은 낙엽과 가로수, 뒤로 학교 담장·앞으로 버스정류장이 살짝
      보임, 흐린 늦은 오후 빛, 부드럽게 반사되는 젖은 아스팔트. 상업가·간판 아님. 배경 2026년 서울 성북구 주택가 스쿨존. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 따뜻한 골든 색감과
      파스텔 톤, 부드러운 노스탤지어 무드, 공간 디테일이 또렷한 정상 노출(과노출 금지), 35mm 필름.
