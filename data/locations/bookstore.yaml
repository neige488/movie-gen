name: bookstore
references:
  - name: aisles
    refName: p1_l_bookstore_aisles
    prompt: 아늑한 동네 독립서점 내부 — 따뜻한 원목 책장에 책이 빼곡, 큰 창으로 드는 부드러운 자연광, 좁은 통로. 책등·표지 글자는 흐릿하게 처리해 읽히지 않게. 배경 2026년 서울. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 따뜻한 골든 색감과 파스텔 톤, 부드러운 노스탤지어 무드, 공간 디테일이 또렷한 정상 노출, 35mm 필름.
    image: bookstore/aisles.png
  - name: storefront
    refName: p1_l_bookstore_storefront
    prompt: 아늑한 동네 독립서점의 길가 입구 외관 — 큰 통유리창과 나무 문틀, 창 안으로 따뜻한 조명의 책장이 비친다, 문 옆 작은 화분, 주말 오후의 부드러운 햇빛. 간판 글자는 흐릿하게 처리해 읽히지 않게. 배경 2026년 서울. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 따뜻한 골든 색감과 파스텔 톤, 부드러운 노스탤지어 무드, 공간 디테일이 또렷한 정상 노출, 35mm 필름.
    image: bookstore/storefront.png
  - name: record-corner
    refName: p1_l_bookstore_recordcorner
    prompt: 서점 안 작은 LP 청음 코너 — 레코드 상자들, 헤드폰 청음 스테이션 두어 개, 따뜻하고 친밀한 조명, 원목과 따뜻한 톤. 배경 2026년 서울. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 읽을 수 있는 간판·글자 없음, 따뜻한 골든 색감과 파스텔 톤, 부드러운 노스탤지어 무드, 공간 디테일이 또렷한 정상 노출, 35mm 필름.
    image: bookstore/record-corner.png
