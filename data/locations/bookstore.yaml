name: bookstore
references:
  - name: aisles
    refName: p1_l_bookstore_aisles
    prompt: >-
      아늑한 동네 독립서점 내부 — 따뜻한 원목 책장에 책이 빼곡, 큰 창으로 드는 부드러운 자연광, 좁은 통로. 책등·표지의 한글 제목이 자연스럽고 또렷하게 보인다. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물
      없는 로케이션 레퍼런스 이미지, 따뜻한 골든 색감과 파스텔 톤, 부드러운 노스탤지어 무드, 공간 디테일이 또렷한 정상 노출, 35mm 필름.
    image: locations/bookstore/aisles.png
  - name: storefront
    refName: p1_l_bookstore_storefront
    prompt: >-
      아늑한 동네 독립서점의 길가 입구 외관 — 큰 통유리창과 나무 문틀, 창 안으로 따뜻한 조명의 책장이 비친다, 문 옆 작은 화분, 주말 오후의 부드러운 햇빛. 나무 간판에 한글로 ‘안녕, 책방’이라고
      또렷이 적혀 있다. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 따뜻한 골든 색감과 파스텔 톤, 부드러운 노스탤지어 무드, 공간 디테일이 또렷한 정상 노출, 35mm
      필름.
    image: locations/bookstore/storefront.png
  - name: record-corner
    refName: p1_l_bookstore_recordcorner
    prompt: >-
      서점 안 작은 LP 청음 코너 — 레코드 상자들, 헤드폰 청음 스테이션 두어 개, 따뜻하고 친밀한 조명, 원목과 따뜻한 톤. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지,
      따뜻한 골든 색감과 파스텔 톤, 부드러운 노스탤지어 무드, 공간 디테일이 또렷한 정상 노출, 35mm 필름.
    image: locations/bookstore/record-corner.png
