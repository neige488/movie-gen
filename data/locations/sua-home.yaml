name: sua-home
references:
  - name: corridor-apartment
    refName: p1_l_suahome_corridorapartment
    prompt: 오래된 복도식 아파트 외관 — 1980~90년대 건물로, 잘 관리됐지만 주변 새 아파트보다 분명히 오래됨. 깨끗한 외부 복도, 오후 빛. (지훈의 새 아파트와의 의도적이고 조용한 대비 — 빈민가 아님.) 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 따뜻한 골든 색감과 파스텔 톤, 부드러운 노스탤지어 무드, 공간 디테일이 또렷한 정상 노출, 35mm 필름.
    image: sua-home/corridor-apartment.png
  - name: front-door
    refName: p1_l_suahome_frontdoor
    prompt: 오래된 아파트의 외부 복도 — 수수하지만 깨끗한 현관문, 고른 복도 빛, 난간 너머로 보이는 도시. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 차갑고 탈색된 색감과 형광의 서늘한 중립 톤, 공간 디테일이 또렷한 정상 노출, 16mm 필름 그레인.
    image: sua-home/front-door.png
  - name: entry-glimpse
    refName: p1_l_suahome_entryglimpse
    prompt: 반쯤 열린 한국 아파트 현관문 너머로 보이는 작고 정돈된 현관 안 — 신발장 위 액자 하나와 그 옆에 가지런히 놓인 빨간 운동화 한 켤레. 얕은 심도. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 차갑고 탈색된 색감과 형광의 서늘한 중립 톤, 공간 디테일이 또렷한 정상 노출, 16mm 필름 그레인.
    image: sua-home/entry-glimpse.png
  - name: photo-wall
    refName: p1_l_suahome_photowall
    prompt: 오래된 아파트 거실 한쪽 벽과 낮은 장식장에 나열된 가족 사진 액자들 — 한 여자아이의 성장 기록. 그중 하나는 피겨 스케이트를 신고 빙판에 선 어린 여자아이가 성인 남자(아빠)의 손을 잡고 있는 사진. 끝자락엔 교복 입은 단정한 영정 사진(검은 리본). 따뜻하지만 슬픈 톤, 얕은 심도. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 차갑고 탈색된 색감과 형광의 서늘한 중립 톤, 공간 디테일이 또렷한 정상 노출, 16mm 필름 그레인.
    image: sua-home/photo-wall.png
