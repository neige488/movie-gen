name: snack-bar
references:
  - name: interior
    refName: p1_l_snackbar_interior
    prompt: 작고 깔끔한 한국 분식집 내부 — 정돈된 테이블, 주방에서 올라오는 김, 유리문으로 드는 햇빛. 소박하지만 잘 관리됨, 낡지 않음. 배경 2026년 서울. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 읽을 수 있는 메뉴·간판·글자 없음, 고르고 부드러운 자연광과 은은한 중립 톤, 공간 구조·재질이 또렷한 정상 노출(그레이드는 후처리 looks가 입힘).
    image: snack-bar/interior.png
  - name: storefront
    refName: p1_l_snackbar_storefront
    prompt: 작고 깔끔한 한국 분식집의 길가 외관 — 큰 유리창 너머로 안쪽 테이블이 들여다보이고, 유리에 거리가 옅게 비친다. 보도와 가게 사이, 오후 햇빛. 소박하지만 잘 관리됨, 낡지 않음. 배경 2026년 서울. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 읽을 수 있는 메뉴·간판·글자 없음, 차갑고 탈색된 색감과 형광의 서늘한 중립 톤, 공간 디테일이 또렷한 정상 노출, 16mm 필름 그레인.
    image: snack-bar/storefront.png
