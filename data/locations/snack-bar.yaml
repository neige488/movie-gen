name: snack-bar
references:
  - name: interior
    refName: p1_l_snackbar_interior
    prompt: 통유리에 깔끔하고 모던한 한국 분식 식당 내부 — 밝고 환한 공간, 미니멀한 우드 테이블과 스툴, 한쪽 전면이 통유리라 바깥 길이 훤히 보인다, 화이트·우드 톤. 요즘식 트렌디한 분식 식당(낡지 않음). 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 따뜻한 골든 색감과 파스텔 톤, 부드러운 노스탤지어 무드, 공간 디테일이 또렷한 정상 노출(과노출 금지), 35mm 필름.
    image: snack-bar/interior.png
  - name: storefront
    refName: p1_l_snackbar_storefront
    prompt: 통유리 파사드의 깔끔하고 모던한 한국 분식 식당 외관 — 큰 통유리 너머로 안쪽 테이블이 훤히 들여다보인다, 미니멀한 간판에 한글 ‘만찬’이 큼직하게 메인으로 적혀 있고, 그 옆에 영어 ‘THE LAST’가 작게 곁들여져 있다. 보도와 가게 사이. 밖에서 안이 다 보이는 환한 공간. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 차갑고 탈색된 색감과 형광의 서늘한 중립 톤, 공간 디테일이 또렷한 정상 노출, 16mm 필름 그레인.
    image: snack-bar/storefront.png
