name: snack-bar
references:
  - name: interior
    refName: p1_l_snackbar_interior
    prompt: 통유리에 깔끔하고 모던한 한국 분식 식당 내부 — 밝고 환한 공간, 미니멀한 우드 테이블과 스툴, 한쪽 전면이 통유리라 바깥 길이 훤히 보인다, 화이트·우드 톤. 요즘식 트렌디한 분식 식당(낡지 않음). 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 고르고 부드러운 자연광과 은은한 중립 톤, 공간 구조·재질이 또렷한 정상 노출(그레이드는 후처리 looks가 입힘).
    image: snack-bar/interior.png
  - name: storefront
    refName: p1_l_snackbar_storefront
    prompt: 통유리 파사드의 깔끔하고 모던한 한국 분식 식당 외관 — 큰 통유리 너머로 안쪽 테이블이 훤히 들여다보인다, 미니멀한 간판에 ‘The last 만찬’(영어+한글 혼용)이라고 적혀 있다. 보도와 가게 사이. 밖에서 안이 다 보이는 환한 공간. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 차갑고 탈색된 색감과 형광의 서늘한 중립 톤, 공간 디테일이 또렷한 정상 노출, 16mm 필름 그레인.
    image: snack-bar/storefront.png
