name: hill-bench
references:
  - name: day-city-view
    refName: p1_l_hillbench_daycityview
    prompt: 산자락의 잘 정비된 언덕 동네 공원에 놓인 나무 벤치, 그 옆에 오래된 구식 빨간 우체통 하나(정비된 공원 속 의도적 빈티지 디테일). 아래로 현대적 아파트 단지와 도시가 펼쳐짐. 따뜻한 오후. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 따뜻한 골든 색감과 파스텔 톤, 부드러운 노스탤지어 무드, 공간 디테일이 또렷한 정상 노출(과노출 금지), 35mm 필름.
    image: hill-bench/day-city-view.png
  - name: sunset
    refName: p1_l_hillbench_sunset
    prompt: 같은 벤치와 오래된 빨간 우체통, 언덕 공원의 해질녘 — 주황빛 하늘, 아래로 켜지는 도시의 불빛. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 따뜻한 골든 색감과 파스텔 톤, 부드러운 노스탤지어 무드, 공간 디테일이 또렷한 정상 노출, 35mm 필름.
    image: hill-bench/sunset.png
  - name: overcast
    refName: p1_l_hillbench_overcast
    prompt: 같은 벤치와 우체통, 흐린 잿빛 하늘 아래 — 차가운 빛, 풀밭을 스치는 바람, 아래로 가라앉은 도시. 배경 2026년 서울 성북구. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 따뜻한 노스탤지어 색감의 부드러운 자연광, 공간이 또렷한 정상 노출, 35mm 필름.
    image: hill-bench/overcast.png
