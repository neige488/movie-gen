name: jihoon-home
references:
  - name: bedroom
    refName: p1_l_jihoonhome_bedroom
    prompt: 환한 한낮, 마당 있는 단독주택 2층의 한국 남자 고등학생 방 — 모니터가 놓인 게이밍 책상, 싱글 침대, 쌓인 참고서, 큰 창으로 밝은 자연광이 들고 너머로 마당과 정원이 내려다보인다. 배경 2026년 서울 단독주택. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 읽을 수 있는 간판·글자 없음, 밝고 고른 자연광과 중립 톤, 공간 구조·재질이 또렷한 정상 노출(시간대·그레이드는 후처리 looks가 입힘).
    image: jihoon-home/bedroom.png
  - name: hallway
    refName: p1_l_jihoonhome_hallway
    prompt: 환한 한낮, 잘 관리된 단독주택의 2층 복도와 아래층으로 내려가는 원목 계단 — 창으로 드는 밝은 자연광, 한쪽 끝의 주방으로 이어지는 동선. 배경 2026년 서울 단독주택. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 읽을 수 있는 간판·글자 없음, 밝고 또렷한 자연광과 중립 톤, 공간 디테일이 또렷한 정상 노출(시간대·그레이드는 후처리 looks가 입힘).
    image: jihoon-home/hallway.png
  - name: living-kitchen
    refName: p1_l_jihoonhome_living
    prompt: 환한 아침, 마당 있는 단독주택의 넓은 거실 겸 주방 — 통창으로 밝은 햇살이 가득 드는 마당·정원, 원목 식탁과 패브릭 소파, 조리대 위 아침 식사 준비 흔적(밥솥·반찬통·과일). 따뜻하고 여유로운 살림, 과시 없이 자연스럽게. 배경 2026년 서울 단독주택. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 읽을 수 있는 간판·글자 없음, 밝고 환한 자연광, 공간이 또렷한 정상 노출(짙은 황금빛·노을 톤 아님 — 그레이드는 후처리 looks가), 35mm 필름.
    image: jihoon-home/living-kitchen.png
  - name: entryway
    refName: p1_l_jihoonhome_entryway
    prompt: 환한 아침, 단독주택의 현관 — 신발장 위 가지런한 가족 신발, 벽에 걸린 외투, 유리문 너머로 보이는 마당과 대문, 밝은 자연광이 든다. 따뜻하고 여유로운 살림, 과시 없이 자연스럽게. 배경 2026년 서울 단독주택. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 읽을 수 있는 간판·글자 없음, 밝고 환한 자연광, 공간이 또렷한 정상 노출(짙은 황금빛·노을 톤 아님 — 그레이드는 후처리 looks가), 35mm 필름.
    image: jihoon-home/entryway.png
  - name: yard
    refName: p1_l_jihoonhome_yard
    prompt: 환한 아침, 단독주택의 마당 — 작은 잔디 정원과 화분 몇, 현관에서 대문으로 이어지는 짧은 길, 낮은 담장과 대문, 맑고 밝은 햇살. 여유롭지만 과시 없이 정돈된. 배경 2026년 서울 단독주택. 최대한 자연스럽게. 인물 없는 로케이션 레퍼런스 이미지, 읽을 수 있는 간판·글자 없음, 밝고 환한 자연광, 공간이 또렷한 정상 노출(짙은 황금빛·노을 톤 아님 — 그레이드는 후처리 looks가), 35mm 필름.
    image: jihoon-home/yard.png
