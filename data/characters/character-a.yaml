name: character-a
headshot:
  prompt: 캐릭터 얼굴 ID 헤드샷, 정면 클로즈업, 중립 표정, 어깨선까지, 단색 배경, 균일한 부드러운 조명, 또렷한 이목구비, 의상·헤어 변화와 무관한 얼굴 식별용, 글씨·워터마크 없음.
  image: characters/character-a/headshot.png
looks:
  - name: introspective
    face:
      image: characters/character-a/introspective/face-2.jpg
    body:
      image: characters/character-a/introspective/body.jpg
    uniform:
      prompt: >-
        한 의상의 2분할 레퍼런스 시트 한 장 — 왼쪽 패널=정면 전신, 오른쪽 패널=후면 전신. 동일 인물·동일 의상, 전신 안 잘리게, 중립 A-포즈, 정면 카메라, 단색 밝은 회색 배경, 균일한 스튜디오
        조명, 소품·글씨·워터마크 없음.
      image: characters/character-a/introspective/uniform.jpeg
    sheet:
      prompt: >-
        첨부한 헤드샷(얼굴 ID)과 uniform(의상 앞/뒤)을 바탕으로 만든 통합 캐릭터 레퍼런스 시트 한 장, 가로 3분할. 중앙: 얼굴 클로즈업(정면, 중립 표정, 얼굴 ID). 왼쪽: 전신 — 위 정면 / 아래
        후면(uniform 의상 유지, A-포즈). 오른쪽: 얼굴 각도 4분할 — 3/4 좌, 3/4 우, 정측면, 로우앵글(아래에서). 동일 인물·동일 의상·일관된 조명, 단색 밝은 회색 배경, 전신 안 잘리게,
        소품·글씨·워터마크 없음.
      image: characters/character-a/introspective/sheet.png
  - name: street-jacket
    face:
      image: characters/character-a/street-jacket/face.png
    body:
      image: characters/character-a/street-jacket/body.png
    uniform:
      prompt: >-
        한 의상의 2분할 레퍼런스 시트 한 장 — 왼쪽 패널=정면 전신, 오른쪽 패널=후면 전신. 동일 인물·동일 의상, 전신 안 잘리게, 중립 A-포즈, 정면 카메라, 단색 밝은 회색 배경, 균일한 스튜디오
        조명, 소품·글씨·워터마크 없음.
      image: characters/character-a/street-jacket/uniform.png
    sheet:
      prompt: >-
        첨부한 헤드샷(얼굴 ID)과 uniform(의상 앞/뒤)을 바탕으로 만든 통합 캐릭터 레퍼런스 시트 한 장, 가로 3분할. 중앙: 얼굴 클로즈업(정면, 중립 표정, 얼굴 ID). 왼쪽: 전신 — 위 정면 / 아래
        후면(uniform 의상 유지, A-포즈). 오른쪽: 얼굴 각도 4분할 — 3/4 좌, 3/4 우, 정측면, 로우앵글(아래에서). 동일 인물·동일 의상·일관된 조명, 단색 밝은 회색 배경, 전신 안 잘리게,
        소품·글씨·워터마크 없음.
      image: characters/character-a/street-jacket/sheet.png
