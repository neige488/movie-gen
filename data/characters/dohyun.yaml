  prompt: 18세 한국 남학생, 마른 체형, 장난기 있는 눈매, 가볍게 손질한 검은 머리. 까불거리고 활달한 평범한 인상. 얼굴 ID 헤드샷 — 정면 클로즈업, 중립 표정, 어깨선까지, 단색 배경, 균일한 부드러운 조명, 또렷한 이목구비, 의상·헤어 변화와 무관한 얼굴 식별용, 글씨·워터마크 없음.
