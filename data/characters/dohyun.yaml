    uniform:
      image: dohyun/uniform/uniform.png
      prompt: "한 의상의 2분할 레퍼런스 시트 한 장 — 좌측 패널=정면 전신, 우측 패널=후면 전신. 동일 인물·동일 의상, 전신 안 잘리게, 중립 A-포즈, 정면 카메라, 단색 밝은 회색 배경, 균일한 스튜디오 조명, 소품·글씨·워터마크 없음. 인물: 또래보다 키가 작고 마른 체형. 의상: 한국 고교 교복."
