name: classmate-girl
headshot:
  refName: p1_c_classmategirl_headshot
  prompt: >-
    18세 한국 여학생, 턱선 길이의 검은 단발, 둥근 얼굴, 화장기 없이 수수하고 평범한 인상 — 눈에 잘 띄지 않는, 어디서나 볼 수 있는 보통의 얼굴(미화·매력 강조 없이). 얼굴 ID 헤드샷 — 정면
    클로즈업, 중립 표정, 어깨선까지, 단색 배경, 균일한 부드러운 조명, 또렷한 이목구비, 의상·헤어 변화와 무관한 얼굴 식별용, 글씨·워터마크 없음.
  image: characters/classmate-girl/headshot.png
voice:
  video: classmate-girl/voice.mp4
  prompt: '첨부한 캐릭터 시트(얼굴·전신)를 바탕으로 만든 약 15초 목소리 레퍼런스 영상. 인물이 정면 미디엄 샷으로 카메라를 보고 말한다 — 먼저 중립 톤으로 짧게 자기소개(이름·정체성), 이어서 감정이 서로 다른 대표 대사 2~3줄. 또래다운 평범하고 수수한 여학생 음색 — 특별히 꾸미지 않은 일상적 말투(미화 없이). 감정 레인지: 무난한 일상 톤 → 가벼운 놀람·수다 → 시큰둥. 동일 인물·동일 얼굴, 입모양과 음성이 또렷이 동기화, 자연스러운 발성과 호흡, 단색 배경, 균일한 조명, 자막·글씨·배경음악 없음.'
  refName: p1_c_classmategirl_voice
looks:
  - name: uniform
    face:
      refName: p1_c_classmategirl_uniform_face
      prompt: >-
        첨부한 헤드샷(얼굴 ID)과 uniform(의상)을 바탕으로 만든 얼굴 레퍼런스 시트 한 장. 왼쪽: 정면 클로즈업 헤드샷. 오른쪽: 얼굴 각도 4분할 — 3/4 좌, 3/4 우, 측면, 아래에서 본
        모습(로우앵글). 동일 인물·동일 얼굴, 해당 의상의 헤어·넥라인 반영, 중립 표정, 단색 배경, 균일한 조명, 글씨·워터마크 없음.
      image: characters/classmate-girl/uniform/face.png
    body:
      refName: p1_c_classmategirl_uniform_full
      prompt: >-
        첨부한 헤드샷(얼굴 ID)과 uniform(의상)을 바탕으로 만든 전신 레퍼런스 시트 한 장, 가로 3분할 — 왼쪽: 헤드샷(정면 클로즈업), 가운데: 전신 앞면, 오른쪽: 전신 뒷면. 동일 인물·동일
        의상, 중립 A-포즈, 전신 안 잘리게, 단색 밝은 회색 배경, 균일한 스튜디오 조명, 소품·글씨·워터마크 없음.
      image: characters/classmate-girl/uniform/body.png
    uniform:
      refName: p1_c_classmategirl_uniform_outfit
      prompt: >-
        바닥에 가지런히 펼쳐 놓은 의상 세트(위에서 내려다본 플랫레이/knolling) — 사람 없음, 옷만. 좌측=앞면 배치, 우측=뒷면 배치, 구성품(상의·하의·신발·소품)이 안 잘리게 전체. 단색 밝은
        회색 배경, 균일한 조명, 옷의 색·질감·디테일이 또렷하게, 글씨·워터마크 없음. 의상: 한국 고교 교복 — 흰 버튼업 셔츠(뾰족 카라), 네이비 블레이저, 버건디 나비넥타이(짧은 리본형), 네이비
        플리츠 치마, 검정 로퍼.
      image: characters/classmate-girl/uniform/uniform.png
