name: jihoon
headshot:
  image: characters/jihoon/headshot-3.png
  refName: p1_c_jihoon_headshot
  prompt: "18세 한국 남학생, 마른 편의 체형, 앞머리가 눈을 살짝 가리는 약간 헝클어진 검은 머리, 쌍꺼풀이 옅고 부드러운 눈매, 차분하고 내성적인 평범한 호감형 인상. 얼굴 ID 헤드샷 — 정면 클로즈업, 중립 표정, 어깨선까지, 단색 배경, 균일한 부드러운 조명, 또렷한 이목구비, 의상·헤어 변화와 무관한 얼굴 식별용, 글씨·워터마크 없음."
looks:
  - name: uniform
    uniform:
      image: jihoon/uniform/uniform.png
      prompt: "한 의상의 2분할 레퍼런스 시트 한 장 — 좌측 패널=정면 전신, 우측 패널=후면 전신. 동일 인물·동일 의상, 전신 안 잘리게, 중립 A-포즈, 정면 카메라, 단색 밝은 회색 배경, 균일한 스튜디오 조명, 소품·글씨·워터마크 없음. 인물: 마른 편의 체형. 의상: 한국 고교 교복 — 흰 셔츠, 검정 바지, 짙은 색 교복 재킷, 살짝 느슨하게 맨 넥타이."
    face:
      image: jihoon/uniform/face.png
      refName: p1_c_jihoon_uniform_face
    body:
      image: jihoon/uniform/body.png
      refName: p1_c_jihoon_uniform_full
