name: sua
headshot:
  image: sua/headshot.png
  refName: p1_c_sua_headshot
  prompt: 18세 한국 여학생, 맑은 피부, 또렷한 눈, 단정한 턱선 길이의 검은 단발에 일자 앞머리, 갸름한 얼굴선. 청순하고 단아한 인상. 얼굴 ID 헤드샷 — 정면 클로즈업, 중립 표정, 어깨선까지, 단색 배경, 균일한 부드러운 조명, 또렷한 이목구비, 의상·헤어 변화와 무관한 얼굴 식별용, 글씨·워터마크 없음.
looks:
  - name: accident-day
    uniform:
      image: sua/accident-day/uniform.png
      prompt: '바닥에 가지런히 펼쳐 놓은 의상 세트(위에서 내려다본 플랫레이/knolling) — 사람 없음, 옷만. 좌측=앞면 배치, 우측=뒷면 배치, 구성품(상의·하의·신발·소품)이 안 잘리게 전체. 단색 밝은 회색 배경, 균일한 조명, 옷의 색·질감·디테일이 또렷하게, 글씨·워터마크 없음. 의상: 오트밀-베이지색 오버사이즈 니트 가디건, 안에 뾰족 카라의 흰 버튼업 셔츠, 짙은 네이비 발목 길이 바지, 흰 발목 양말, 빨간 캔버스 운동화.'
      refName: p1_c_sua_accidentday_outfit
    face:
      image: sua/accident-day/face.png
      refName: p1_c_sua_accidentday_face
      prompt: '첨부한 헤드샷(얼굴 ID)과 uniform(의상)을 바탕으로 만든 얼굴 레퍼런스 시트 한 장. 왼쪽: 정면 클로즈업 헤드샷. 오른쪽: 얼굴 각도 4분할 — 3/4 좌, 3/4 우, 측면, 아래에서 본 모습(로우앵글). 동일 인물·동일 얼굴, 해당 의상의 헤어·넥라인 반영, 중립 표정, 단색 배경, 균일한 조명, 글씨·워터마크 없음.'
    body:
      image: sua/accident-day/body.png
      refName: p1_c_sua_accidentday_full
      prompt: 첨부한 헤드샷(얼굴 ID)과 uniform(의상)을 바탕으로 만든 전신 레퍼런스 시트 한 장, 가로 3분할 — 정면, 측면, 후면. 동일 인물·동일 의상, 중립 A-포즈, 전신 안 잘리게, 단색 밝은 회색 배경, 균일한 스튜디오 조명, 소품·글씨·워터마크 없음.
  - name: uniform
    uniform:
      image: sua/uniform/uniform.png
      prompt: '바닥에 가지런히 펼쳐 놓은 의상 세트(위에서 내려다본 플랫레이/knolling) — 사람 없음, 옷만. 좌측=앞면 배치, 우측=뒷면 배치, 구성품(상의·하의·신발·소품)이 안 잘리게 전체. 단색 밝은 회색 배경, 균일한 조명, 옷의 색·질감·디테일이 또렷하게, 글씨·워터마크 없음. 의상: 한국 고교 교복 — 흰 버튼업 셔츠(뾰족 카라), 네이비 블레이저, 버건디 나비넥타이(짧은 리본형), 네이비 플리츠 치마, 검정 로퍼.'
      refName: p1_c_sua_uniform_outfit
    face:
      image: sua/uniform/face.png
      refName: p1_c_sua_uniform_face
      prompt: '첨부한 헤드샷(얼굴 ID)과 uniform(의상)을 바탕으로 만든 얼굴 레퍼런스 시트 한 장. 왼쪽: 정면 클로즈업 헤드샷. 오른쪽: 얼굴 각도 4분할 — 3/4 좌, 3/4 우, 측면, 아래에서 본 모습(로우앵글). 동일 인물·동일 얼굴, 해당 의상의 헤어·넥라인 반영, 중립 표정, 단색 배경, 균일한 조명, 글씨·워터마크 없음.'
