name: sua
headshot:
  image: sua/headshot.png
  refName: p1_c_sua_headshot
  prompt: "18세 한국 여학생, 맑은 피부, 또렷한 눈, 단정한 턱선 길이의 검은 단발에 일자 앞머리, 갸름한 얼굴선. 청순하고 단아한 인상. 얼굴 ID 헤드샷 — 정면 클로즈업, 중립 표정, 어깨선까지, 단색 배경, 균일한 부드러운 조명, 또렷한 이목구비, 의상·헤어 변화와 무관한 얼굴 식별용, 글씨·워터마크 없음."
looks:
  - name: accident-day
    uniform:
      image: sua/accident-day/uniform.png
      prompt: "한 의상의 2분할 레퍼런스 시트 한 장 — 좌측 패널=정면 전신, 우측 패널=후면 전신. 동일 인물·동일 의상, 전신 안 잘리게, 중립 A-포즈, 정면 카메라, 단색 밝은 회색 배경, 균일한 스튜디오 조명, 소품·글씨·워터마크 없음. 인물: 약간 마른 체형. 의상: 오트밀-베이지색 오버사이즈 니트 가디건, 안에 뾰족 카라의 흰 버튼업 셔츠, 짙은 네이비 발목 길이 바지, 흰 발목 양말, 빨간 캔버스 운동화."
    face:
      image: sua/accident-day/face.png
      refName: p1_c_sua_accidentday_face
    body:
      image: sua/accident-day/body.png
      refName: p1_c_sua_accidentday_full
  - name: uniform
    uniform:
      image: sua/uniform/uniform.png
      prompt: "한 의상의 2분할 레퍼런스 시트 한 장 — 좌측 패널=정면 전신, 우측 패널=후면 전신. 동일 인물·동일 의상, 전신 안 잘리게, 중립 A-포즈, 정면 카메라, 단색 밝은 회색 배경, 균일한 스튜디오 조명, 소품·글씨·워터마크 없음. 인물: 약간 마른 체형. 의상: 치마 있는 한국 고교 교복, 턱선 길이의 검은 단발."
    face:
      image: sua/uniform/face.png
      refName: p1_c_sua_uniform_face
    body:
      image: sua/uniform/body.png
      refName: p1_c_sua_uniform_full
  - name: traveler-braid
    uniform:
      image: sua/traveler-braid/uniform.png
      prompt: "한 의상의 2분할 레퍼런스 시트 한 장 — 좌측 패널=정면 전신, 우측 패널=후면 전신. 동일 인물·동일 의상, 전신 안 잘리게, 중립 A-포즈, 정면 카메라, 단색 밝은 회색 배경, 균일한 스튜디오 조명, 소품·글씨·워터마크 없음. 인물: 약간 마른 체형, 등 중간까지 내려오는 하나로 땋은 긴 검은 머리. 의상: 가벼운 재킷과 편한 바지의 여행자 복장."
