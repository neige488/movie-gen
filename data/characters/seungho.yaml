name: seungho
headshot:
  image: seungho/headshot.png
  refName: p1_c_seungho_headshot
  prompt: "18세 한국 남학생, 둥글고 살짝 통통한 얼굴, 작은 눈에 잘 웃는 눈매, 건강한 혈색, 짧고 단정한 검은 머리. 친근하고 수더분한 인상. 얼굴 ID 헤드샷 — 정면 클로즈업, 중립 표정, 어깨선까지, 단색 배경, 균일한 부드러운 조명, 또렷한 이목구비, 의상·헤어 변화와 무관한 얼굴 식별용, 글씨·워터마크 없음."
looks:
  - name: uniform
    uniform:
      image: seungho/uniform/uniform.png
      prompt: "한 의상의 2분할 레퍼런스 시트 한 장 — 좌측 패널=정면 전신, 우측 패널=후면 전신. 동일 인물·동일 의상, 전신 안 잘리게, 중립 A-포즈, 정면 카메라, 단색 밝은 회색 배경, 균일한 스튜디오 조명, 소품·글씨·워터마크 없음. 인물: 또래보다 키가 작고 다부진(살짝 통통한) 체형. 의상: 한국 고교 교복, 살짝 풀어 입은 차림."
    face:
      image: seungho/uniform/face.png
      refName: p1_c_seungho_uniform_face
