name: seungho
headshot:
  image: seungho/headshot.png
  refName: p1_c_seungho_headshot
  prompt: 18세 한국 남학생, 둥글고 살짝 통통한 얼굴, 작은 눈에 잘 웃는 눈매, 건강한 혈색, 짧고 단정한 검은 머리. 친근하고 수더분한 인상. 얼굴 ID 헤드샷 — 정면 클로즈업, 중립 표정, 어깨선까지, 단색 배경, 균일한 부드러운 조명, 또렷한 이목구비, 의상·헤어 변화와 무관한 얼굴 식별용, 글씨·워터마크 없음.
looks:
  - name: uniform
    uniform:
      image: seungho/uniform/uniform.png
      prompt: '바닥에 가지런히 펼쳐 놓은 의상 세트(위에서 내려다본 플랫레이/knolling) — 사람 없음, 옷만. 좌측=앞면 배치, 우측=뒷면 배치, 구성품(상의·하의·신발·소품)이 안 잘리게 전체. 단색 밝은 회색 배경, 균일한 조명, 옷의 색·질감·디테일이 또렷하게, 글씨·워터마크 없음. 의상: 한국 고교 교복 — 흰 버튼업 셔츠(뾰족 카라), 네이비 블레이저(가슴 엠블럼), 버건디 넥타이, 네이비 슬랙스, 검정 로퍼. 살짝 풀어 입은 차림.'
