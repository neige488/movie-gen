name: jihoon-mother
headshot:
  refName: p1_c_jihoonmother_headshot
  prompt: >-
    40대 후반 한국 여성, 우아하게 손질한 어깨 길이 단발, 갸름하고 기품 있는 얼굴, 잘 관리된 매끄러운 피부에 은은한 메이크업. 여유롭고 세련된 중상류층 부인의 온화하면서도 품위 있는 인상. 얼굴 ID
    헤드샷 — 정면 클로즈업, 중립 표정, 어깨선까지, 단색 배경, 균일한 부드러운 조명, 또렷한 이목구비, 의상·헤어 변화와 무관한 얼굴 식별용, 글씨·워터마크 없음.
  image: characters/jihoon-mother/headshot.png
voice:
  video: jihoon-mother/voice.mp4
  prompt: '첨부한 캐릭터 시트(얼굴·전신)를 바탕으로 만든 약 15초 목소리 레퍼런스 영상. 인물이 정면 미디엄 샷으로 카메라를 보고 이 영화 속 실제 대사를 감정을 살려 차례로 말한다 — (1) “지훈아, 너 학원 갈 때 안 됐니~?”(정겨운 일상 톤) → (2) “지훈아, 밥 먹어.”(걱정스럽게) → (3) “얘가 그냥 본 것뿐인데도… 그래요?”(안타까움에 떨리며). 부드럽고 품위 있는 40대 후반 여성 음색. 입모양과 음성이 또렷이 동기화, 자연스러운 발성과 호흡, 단색 배경, 균일한 조명, 자막·글씨·배경음악 없음.'
  refName: p1_c_jihoonmother_voice
looks:
  - name: indoor
    face:
      refName: p1_c_jihoonmother_indoor_face
      prompt: >-
        첨부한 헤드샷(얼굴 ID)과 uniform(의상)을 바탕으로 만든 얼굴 레퍼런스 시트 한 장. 왼쪽: 정면 클로즈업 헤드샷. 오른쪽: 얼굴 각도 4분할 — 3/4 좌, 3/4 우, 측면, 아래에서 본
        모습(로우앵글). 동일 인물·동일 얼굴, 해당 의상의 헤어·넥라인 반영, 중립 표정, 단색 배경, 균일한 조명, 글씨·워터마크 없음.
      image: characters/jihoon-mother/indoor/face.png
    body:
      refName: p1_c_jihoonmother_indoor_full
      prompt: >-
        첨부한 헤드샷(얼굴 ID)과 uniform(의상)을 바탕으로 만든 전신 레퍼런스 시트 한 장, 가로 3분할 — 왼쪽: 헤드샷(정면 클로즈업), 가운데: 전신 앞면, 오른쪽: 전신 뒷면. 동일 인물·동일
        의상, 중립 A-포즈, 전신 안 잘리게, 단색 밝은 회색 배경, 균일한 스튜디오 조명, 소품·글씨·워터마크 없음.
      image: characters/jihoon-mother/indoor/body.png
    uniform:
      refName: p1_c_jihoonmother_indoor_outfit
      prompt: >-
        바닥에 가지런히 펼쳐 놓은 의상 세트(위에서 내려다본 플랫레이/knolling) — 사람 없음, 옷만. 좌측=앞면 배치, 우측=뒷면 배치, 구성품(상의·하의·신발)이 안 잘리게 전체. 단색 밝은 회색
        배경, 균일한 조명, 옷의 색·질감·디테일이 또렷하게, 글씨·워터마크 없음. 의상: 집에서 입는 실내복 — 부드러운 캐시미어 니트(또는 단정한 홈 카디건)와 편안한 와이드 슬랙스, 가는 골드 목걸이,
        굽 없는 실내화. 가방·손목시계·구두 없음. 차분하고 세련된 색조(아이보리·베이지·딥네이비).
      image: characters/jihoon-mother/indoor/uniform.png
  - name: outing
    face:
      refName: p1_c_jihoonmother_outing_face
      prompt: >-
        첨부한 헤드샷(얼굴 ID)과 uniform(의상)을 바탕으로 만든 얼굴 레퍼런스 시트 한 장. 왼쪽: 정면 클로즈업 헤드샷. 오른쪽: 얼굴 각도 4분할 — 3/4 좌, 3/4 우, 측면, 아래에서 본
        모습(로우앵글). 동일 인물·동일 얼굴, 해당 의상의 헤어·넥라인 반영, 중립 표정, 단색 배경, 균일한 조명, 글씨·워터마크 없음.
      image: jihoon-mother/outing/face.png
    body:
      refName: p1_c_jihoonmother_outing_full
      prompt: >-
        첨부한 헤드샷(얼굴 ID)과 uniform(의상)을 바탕으로 만든 전신 레퍼런스 시트 한 장, 가로 3분할 — 왼쪽: 헤드샷(정면 클로즈업), 가운데: 전신 앞면, 오른쪽: 전신 뒷면. 동일 인물·동일
        의상, 중립 A-포즈, 전신 안 잘리게, 단색 밝은 회색 배경, 균일한 스튜디오 조명, 소품·글씨·워터마크 없음.
      image: jihoon-mother/outing/body.png
    uniform:
      refName: p1_c_jihoonmother_outing_outfit
      prompt: >-
        바닥에 가지런히 펼쳐 놓은 의상 세트(위에서 내려다본 플랫레이/knolling) — 사람 없음, 옷만. 좌측=앞면 배치, 우측=뒷면 배치, 구성품(상의·하의·아우터·신발·소품)이 안 잘리게 전체. 단색
        밝은 회색 배경, 균일한 조명, 옷의 색·질감·디테일이 또렷하게, 글씨·워터마크 없음. 의상: 외출복 — 우아한 트렌치코트(또는 정장풍 니트와 슬랙스)에 실크 스카프, 가는 골드 목걸이, 손목시계,
        구조적인 핸드백, 굽 있는 로퍼 또는 펌프스. 중상류층 부인의 단정한 외출 차림. 차분한 색조(카멜·베이지·딥네이비).
      image: jihoon-mother/outing/uniform.png
