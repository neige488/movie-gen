name: jihoon-mother
headshot:
  image: jihoon-mother/headshot.png
  refName: p1_c_jihoonmother_headshot
  prompt: 40대 후반 한국 여성, 어깨 길이로 단정하게 묶은 파마머리, 둥글고 온화한 얼굴. 평범하고 따뜻한 인상. 얼굴 ID 헤드샷 — 정면 클로즈업, 중립 표정, 어깨선까지, 단색 배경, 균일한 부드러운 조명, 또렷한 이목구비, 의상·헤어 변화와 무관한 얼굴 식별용, 글씨·워터마크 없음.
looks:
  - name: default
    uniform:
      image: jihoon-mother/default/uniform.png
      prompt: '바닥에 가지런히 펼쳐 놓은 의상 세트(위에서 내려다본 플랫레이/knolling) — 사람 없음, 옷만. 좌측=앞면 배치, 우측=뒷면 배치, 구성품(상의·하의·신발·소품)이 안 잘리게 전체. 단색 밝은 회색 배경, 균일한 조명, 옷의 색·질감·디테일이 또렷하게, 글씨·워터마크 없음. 의상: 수수한 평상복 위에 가정용 앞치마.'
      refName: p1_c_jihoonmother_default_outfit
    face:
      image: jihoon-mother/default/face.png
      refName: p1_c_jihoonmother_default_face
      prompt: '첨부한 헤드샷(얼굴 ID)과 uniform(의상)을 바탕으로 만든 얼굴 레퍼런스 시트 한 장. 왼쪽: 정면 클로즈업 헤드샷. 오른쪽: 얼굴 각도 4분할 — 3/4 좌, 3/4 우, 측면, 아래에서 본 모습(로우앵글). 동일 인물·동일 얼굴, 해당 의상의 헤어·넥라인 반영, 중립 표정, 단색 배경, 균일한 조명, 글씨·워터마크 없음.'
    body:
      image: jihoon-mother/default/body.png
      refName: p1_c_jihoonmother_default_full
      prompt: 첨부한 헤드샷(얼굴 ID)과 uniform(의상)을 바탕으로 만든 전신 레퍼런스 시트 한 장, 가로 3분할 — 정면, 측면, 후면. 동일 인물·동일 의상, 중립 A-포즈, 전신 안 잘리게, 단색 밝은 회색 배경, 균일한 스튜디오 조명, 소품·글씨·워터마크 없음.
