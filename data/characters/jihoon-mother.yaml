name: jihoon-mother
headshot:
  image: jihoon-mother/headshot.png
  refName: p1_c_jihoonmother_headshot
  prompt: 40대 후반 한국 여성, 우아하게 손질한 어깨 길이 단발, 갸름하고 기품 있는 얼굴, 잘 관리된 매끄러운 피부에 은은한 메이크업. 여유롭고 세련된 중상류층 부인의 온화하면서도 품위 있는 인상. 얼굴 ID 헤드샷 — 정면 클로즈업, 중립 표정, 어깨선까지, 단색 배경, 균일한 부드러운 조명, 또렷한 이목구비, 의상·헤어 변화와 무관한 얼굴 식별용, 글씨·워터마크 없음.
looks:
  - name: default
    uniform:
      image: jihoon-mother/default/uniform.png
      prompt: '바닥에 가지런히 펼쳐 놓은 의상 세트(위에서 내려다본 플랫레이/knolling) — 사람 없음, 옷만. 좌측=앞면 배치, 우측=뒷면 배치, 구성품(상의·하의·신발·소품)이 안 잘리게 전체. 단색 밝은 회색 배경, 균일한 조명, 옷의 색·질감·디테일이 또렷하게, 글씨·워터마크 없음. 의상: 고급스러운 캐시미어 니트(또는 단정한 실크 블라우스)와 잘 재단된 슬랙스, 가는 골드 목걸이, 그 위에 깔끔한 리넨 홈 앞치마. 차분하고 세련된 색조(아이보리·베이지·딥네이비)의 잘 관리된 중상류층 가정 평상복.'
      refName: p1_c_jihoonmother_default_outfit
    face:
      image: jihoon-mother/default/face.png
      refName: p1_c_jihoonmother_default_face
      prompt: '첨부한 헤드샷(얼굴 ID)과 uniform(의상)을 바탕으로 만든 얼굴 레퍼런스 시트 한 장. 왼쪽: 정면 클로즈업 헤드샷. 오른쪽: 얼굴 각도 4분할 — 3/4 좌, 3/4 우, 측면, 아래에서 본 모습(로우앵글). 동일 인물·동일 얼굴, 해당 의상의 헤어·넥라인 반영, 중립 표정, 단색 배경, 균일한 조명, 글씨·워터마크 없음.'
    body:
      image: jihoon-mother/default/body.png
      refName: p1_c_jihoonmother_default_full
      prompt: '첨부한 헤드샷(얼굴 ID)과 uniform(의상)을 바탕으로 만든 전신 레퍼런스 시트 한 장, 가로 3분할 — 왼쪽: 헤드샷(정면 클로즈업), 가운데: 전신 앞면, 오른쪽: 전신 뒷면. 동일 인물·동일 의상, 중립 A-포즈, 전신 안 잘리게, 단색 밝은 회색 배경, 균일한 스튜디오 조명, 소품·글씨·워터마크 없음.'
