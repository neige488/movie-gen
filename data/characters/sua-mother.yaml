name: sua-mother
headshot:
  image: sua-mother/headshot.png
  refName: p1_c_suamother_headshot
  prompt: "40대 후반 한국 여성, 단정하지만 윤기 적은 머리, 차분하고 수수한 인상. 얼굴 ID 헤드샷 — 정면 클로즈업, 중립 표정, 어깨선까지, 단색 배경, 균일한 부드러운 조명, 또렷한 이목구비, 의상·헤어 변화와 무관한 얼굴 식별용, 글씨·워터마크 없음."
looks:
  - name: default
    uniform:
      image: sua-mother/default/uniform.png
      prompt: "한 의상의 2분할 레퍼런스 시트 한 장 — 좌측 패널=정면 전신, 우측 패널=후면 전신. 동일 인물·동일 의상, 전신 안 잘리게, 중립 A-포즈, 정면 카메라, 단색 밝은 회색 배경, 균일한 스튜디오 조명, 소품·글씨·워터마크 없음. 인물: 40대 후반 여성, 마른 편의 체형. 의상: 수수한 집 옷."
    face:
      image: sua-mother/default/face.png
