name: sua-mother
headshot:
  refName: p1_c_suamother_headshot
  prompt: >-
    40대 후반 한국 여성, 단정하지만 윤기 적은 머리, 차분하고 수수한 인상. 얼굴 ID 헤드샷 — 정면 클로즈업, 중립 표정, 어깨선까지, 단색 배경, 균일한 부드러운 조명, 또렷한 이목구비, 의상·헤어
    변화와 무관한 얼굴 식별용, 글씨·워터마크 없음.
  image: characters/sua-mother/headshot.png
looks:
  - name: default
    face:
      refName: p1_c_suamother_default_face
      prompt: >-
        첨부한 헤드샷(얼굴 ID)과 uniform(의상)을 바탕으로 만든 얼굴 레퍼런스 시트 한 장. 왼쪽: 정면 클로즈업 헤드샷. 오른쪽: 얼굴 각도 4분할 — 3/4 좌, 3/4 우, 측면, 아래에서 본
        모습(로우앵글). 동일 인물·동일 얼굴, 해당 의상의 헤어·넥라인 반영, 중립 표정, 단색 배경, 균일한 조명, 글씨·워터마크 없음.
      image: characters/sua-mother/default/face.png
    body:
      refName: p1_c_suamother_default_full
      prompt: >-
        첨부한 헤드샷(얼굴 ID)과 uniform(의상)을 바탕으로 만든 전신 레퍼런스 시트 한 장, 가로 3분할 — 왼쪽: 헤드샷(정면 클로즈업), 가운데: 전신 앞면, 오른쪽: 전신 뒷면. 동일 인물·동일
        의상, 중립 A-포즈, 전신 안 잘리게, 단색 밝은 회색 배경, 균일한 스튜디오 조명, 소품·글씨·워터마크 없음.
      image: characters/sua-mother/default/body.png
    uniform:
      refName: p1_c_suamother_default_outfit
      prompt: >-
        바닥에 가지런히 펼쳐 놓은 의상 세트(위에서 내려다본 플랫레이/knolling) — 사람 없음, 옷만. 좌측=앞면 배치, 우측=뒷면 배치, 구성품(상의·하의·양말)이 안 잘리게 전체. 단색 밝은 회색
        배경, 균일한 조명, 옷의 색·질감·디테일이 또렷하게, 글씨·워터마크 없음. 의상: 집에서 입는 소박한 실내복 — 편안한 면 니트(또는 단정한 가디건)와 헐렁한 면바지, 발에는 면 양말.
        신발·실내화·가방 없음. 어둡고 가라앉은 무채색 위주의 색조(짙은 회색·먹빛·짙은 남색), 애도가 밴 듯 차분하게.
      image: characters/sua-mother/default/uniform-2.png
