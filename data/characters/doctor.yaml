name: doctor
headshot:
  image: doctor/headshot.png
  refName: p1_c_doctor_headshot
  prompt: "50대 한국 남성, 은테 안경, 희끗희끗한 짧고 단정한 머리, 단정하고 지적인 이목구비. 차분하고 신뢰감 있는 인상. 얼굴 ID 헤드샷 — 정면 클로즈업, 중립 표정, 어깨선까지, 단색 배경, 균일한 부드러운 조명, 또렷한 이목구비, 의상·헤어 변화와 무관한 얼굴 식별용, 글씨·워터마크 없음."
looks:
  - name: default
    uniform:
      image: doctor/default/uniform.png
      prompt: "한 의상의 2분할 레퍼런스 시트 한 장 — 좌측 패널=정면 전신, 우측 패널=후면 전신. 동일 인물·동일 의상, 전신 안 잘리게, 중립 A-포즈, 정면 카메라, 단색 밝은 회색 배경, 균일한 스튜디오 조명, 소품·글씨·워터마크 없음. 인물: 50대 남성, 보통 체형. 의상: 흰 진료 가운, 안에 셔츠와 슬랙스, 은테 안경."
    face:
      image: doctor/default/face.png
      refName: p1_c_doctor_default_face
    body:
      image: doctor/default/body.png
      refName: p1_c_doctor_default_full
