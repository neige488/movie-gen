name: doctor
headshot:
  refName: p1_c_doctor_headshot
  prompt: >-
    50대 한국 남성, 은테 안경, 희끗희끗한 짧고 단정한 머리, 단정하고 지적인 이목구비. 차분하고 신뢰감 있는 인상. 얼굴 ID 헤드샷 — 정면 클로즈업, 중립 표정, 어깨선까지, 단색 배경, 균일한 부드러운
    조명, 또렷한 이목구비, 의상·헤어 변화와 무관한 얼굴 식별용, 글씨·워터마크 없음.
  image: characters/doctor/headshot-2.png
voice:
  video: doctor/voice.mp4
  prompt: '첨부한 캐릭터 시트(얼굴·전신)를 바탕으로 만든 약 10초 목소리 레퍼런스 영상. 인물이 정면 미디엄 샷으로 카메라를 보고 평범한 상황의 일상 톤으로 이 영화 속 대사 두 마디를 자연스럽게 이어 말한다 — “최근에 어떤 사고를 목격하셨나요?” … “본 것만으로도, 옵니다.” 차분하고 신뢰감 있는 중년 정신과 의사 음색. 입모양과 음성이 또렷이 동기화, 자연스러운 발성과 호흡, 단색 배경, 균일한 조명, 자막·글씨·배경음악 없음.'
  refName: p1_c_doctor_voice
looks:
  - name: default
    face:
      refName: p1_c_doctor_default_face
      prompt: >-
        첨부한 헤드샷(얼굴 ID)과 uniform(의상)을 바탕으로 만든 얼굴 레퍼런스 시트 한 장. 왼쪽: 정면 클로즈업 헤드샷. 오른쪽: 얼굴 각도 4분할 — 3/4 좌, 3/4 우, 측면, 아래에서 본
        모습(로우앵글). 동일 인물·동일 얼굴, 해당 의상의 헤어·넥라인 반영, 중립 표정, 단색 배경, 균일한 조명, 글씨·워터마크 없음.
      image: characters/doctor/default/face.png
    body:
      refName: p1_c_doctor_default_full
      prompt: >-
        첨부한 헤드샷(얼굴 ID)과 uniform(의상)을 바탕으로 만든 전신 레퍼런스 시트 한 장, 가로 3분할 — 왼쪽: 헤드샷(정면 클로즈업), 가운데: 전신 앞면, 오른쪽: 전신 뒷면. 동일 인물·동일
        의상, 중립 A-포즈, 전신 안 잘리게, 단색 밝은 회색 배경, 균일한 스튜디오 조명, 소품·글씨·워터마크 없음.
      image: characters/doctor/default/body.png
    uniform:
      refName: p1_c_doctor_default_outfit
      prompt: >-
        바닥에 가지런히 펼쳐 놓은 의상 세트(위에서 내려다본 플랫레이/knolling) — 사람 없음, 옷만. 좌측=앞면 배치, 우측=뒷면 배치, 구성품(상의·하의·신발·소품)이 안 잘리게 전체. 단색 밝은
        회색 배경, 균일한 조명, 옷의 색·질감·디테일이 또렷하게, 글씨·워터마크 없음. 의상: 흰 진료 가운, 안에 셔츠와 슬랙스, 은테 안경.
      image: characters/doctor/default/uniform.png
